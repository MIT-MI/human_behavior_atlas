# Unified SFT config — vision path (Qwen3-VL-4B) on Human Behavior Atlas parquet.
#
# HBA is an audio-heavy, modality-mixed corpus. With filter_by_modality=true and
# modalities="images,videos", only the image/video rows are used — the right
# subset for a vision-language model. Paths are overridden by run_sft.sh / CLI.

data:
  train_files: "/path/to/human_behavior_atlas_v2"   # override via --train_files or HBA_DATA_DIR
  val_files: "/path/to/human_behavior_atlas_v2"

model:
  name: "Qwen/Qwen3-VL-4B-Instruct"
  arch: "auto"                 # auto -> AutoModelForImageTextToText | omni_thinker | causal_lm
  training_strategy: "lora"    # "lora" or "full"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"
  lora_config:
    r: 32
    alpha: 64
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "down_proj", "up_proj"]

train:
  train_batch_size: 1
  val_batch_size: 1
  lr: 1e-4
  epochs: 2
  gradient_accumulation_steps: 16
  num_workers: 0
  save_checkpoint_dir: "./checkpoints/sft_qwen3vl_hba"
  load_checkpoint_path: null
  save_every_n_epochs: 1
  save_every_n_steps: null
  validate_every_n_epochs: 1
  validate_every_n_steps: null
  use_scheduler: true
  scheduler_type: "cosine"
  warmup_steps: 10
  max_grad_norm: 1.0
  seed: 42

dataset_config:
  # HF split slicing applied AFTER modality filtering.
  train_split: "train"
  val_split: "validation"
  prompt_key: "problem"
  response_key: "answer"
  image_key: "images"
  video_key: "videos"
  audio_key: "audios"
  modality_signature_key: "modality_signature"
  modalities: "images,videos"   # vision-only; <audio> tags are stripped
  filter_by_modality: true      # keep only image/video rows (HBA is ~95% audio)
  video_nframes: 8
  max_prompt_length: 4096
  max_response_length: 128
  max_length: 4224
  truncation: "right"
  audio_max_seconds: 10
  format_prompt: null

wandb:
  use: false
  project: "sft-qwen3vl-hba"
  entity: null
